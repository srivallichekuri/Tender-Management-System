<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <h1>Login Page</h1>

    <form method="POST">

        <input type="text"
        name="username"
        placeholder="Enter Username"
        required>

        <br><br>

        <input type="password"
        name="password"
        placeholder="Enter Password"
        required>

        <br><br>

        <button type="submit">Login</button>

    </form>

    <br>

    <p>
        Don't have an account?
    <a href="/register">Register here</a>
    </p>

</body>

</html>
