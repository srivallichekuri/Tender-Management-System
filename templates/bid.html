<!DOCTYPE html>
<html>

<head>

    <title>Submit Bid</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        <h1>Submit Your Bid</h1>

        <form method="POST">

            <input type="text"
            name="contractor"
            placeholder="Enter Company Name"
            required>

            <br><br>

            <input type="text"
            name="amount"
            placeholder="Enter Bid Amount"
            required>

            <br><br>

            <textarea
            name="proposal"
            placeholder="Enter Proposal"
            rows="6"
            cols="40"
            required>
            </textarea>

            <br><br>

            <button type="submit">
                Submit Bid
            </button>

        </form>

    </div>

</body>

</html>
